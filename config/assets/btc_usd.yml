# BTCUSD perp — synth-forward strategy config
# Production dials validated by v5 OOS test (+462% Dec 2025-Feb 2026)
strategy: btc_synth_forward
underlying: BTC
perp_symbol: BTCUSD
venue: delta_india

# Signal gates
entry_pct: 0.006          # 0.6% gate — tight, validated optimal
persist_hours: 2
min_strikes: 3
moneyness_band: 0.05

# Risk management
stop_loss_pct: 0.015
partial_tp_pct: 0.010
trail_peak_pct: 0.005
trail_giveback_pct: 0.0025

# Sizing
size_base_pct: 0.005      # signal strength at which size_mult = 1×
size_min_mult: 0.5
size_max_mult: 3.0
max_concurrent: 2
leverage: 1.0             # 1× = no leverage; 2× / 3× available

# Schedule (UTC — crypto is 24/7)
tick_interval_minutes: 60
