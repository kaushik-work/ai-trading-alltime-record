name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Droplet and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /root/ai-trading-alltime-record
            git pull origin main
            # Free disk before build. --no-cache builds + frequent pushes
            # otherwise pile up dangling layers until the 33GB volume runs
            # out (last failure: 12:13 UTC, 2026-06-10). Safe on a single-
            # container deploy — only prunes unused images / build cache.
            df -h /
            docker system prune -af --volumes
            df -h /
            docker compose down
            # Drop --no-cache: with the new .dockerignore the build context
            # is small (≈4MB) and layer caching is correct, so cache reuse
            # cuts deploy time from ~60s to ~10s without staleness risk.
            docker compose build
            docker compose up -d --force-recreate
