services:

  api:
    build: .
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --workers 1
    env_file: .env
    volumes:
      - /root/ai-trading-alltime-record/.env:/app/.env
      - /root/ai-trading-alltime-record/backtest_cache:/app/backtest_cache
      - app_data:/app/db
      - app_logs:/app/logs
      - app_journals:/app/journals
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

# api handles everything — ATR Intraday + C-ICT both run inside api via BotRunner
volumes:
  app_data:
  app_logs:
  app_journals:
