services:

  api:
    build: .
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --workers 1
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env
      - ./backtest_cache:/app/backtest_cache
      - app_data:/app/db
      - app_logs:/app/logs
      - app_journals:/app/journals
    restart: unless-stopped

  # ── 5-min option chain snapshot collector ──────────────────────────────────
  # Runs 24/7 on the droplet (no Windows / laptop dependency).
  # Daily routine inside the container: wait for 09:10 IST, collect every 5 min
  # until 15:35 IST, write CSV (db/oi_snapshots/) AND mirror each snapshot to
  # MongoDB (option_snapshots collection) for queryable historical premium data.
  # The script auto-exits on weekends/holidays; the wrapper restarts it daily
  # at 09:00 IST so we don't need to script docker restart externally.
  collector:
    build: .
    command: >
      sh -c '
        while true; do
          NOW=$$(date -u +%H%M)
          if [ "$$NOW" -ge "0330" ] && [ "$$NOW" -lt "1005" ]; then
            python scripts/collect_option_snapshots.py --symbol NIFTY --interval 5 --strikes 8 || true
          else
            sleep 60
          fi
        done
      '
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - app_data:/app/db
      - app_logs:/app/logs
    restart: unless-stopped
    depends_on:
      - api

  collector-banknifty:
    build: .
    command: >
      sh -c '
        while true; do
          NOW=$$(date -u +%H%M)
          if [ "$$NOW" -ge "0330" ] && [ "$$NOW" -lt "1005" ]; then
            python scripts/collect_option_snapshots.py --symbol BANKNIFTY --interval 5 --strikes 8 || true
          else
            sleep 60
          fi
        done
      '
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - app_data:/app/db
      - app_logs:/app/logs
    restart: unless-stopped
    depends_on:
      - api

  collector-finnifty:
    build: .
    command: >
      sh -c '
        while true; do
          NOW=$$(date -u +%H%M)
          if [ "$$NOW" -ge "0330" ] && [ "$$NOW" -lt "1005" ]; then
            python scripts/collect_option_snapshots.py --symbol FINNIFTY --interval 5 --strikes 8 || true
          else
            sleep 60
          fi
        done
      '
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - app_data:/app/db
      - app_logs:/app/logs
    restart: unless-stopped
    depends_on:
      - api

  collector-sensex:
    build: .
    command: >
      sh -c '
        while true; do
          NOW=$$(date -u +%H%M)
          if [ "$$NOW" -ge "0330" ] && [ "$$NOW" -lt "1005" ]; then
            python scripts/collect_option_snapshots.py --symbol SENSEX --interval 5 --strikes 8 || true
          else
            sleep 60
          fi
        done
      '
    env_file: .env
    volumes:
      - ./.env:/app/.env
      - app_data:/app/db
      - app_logs:/app/logs
    restart: unless-stopped
    depends_on:
      - api

# api handles all live trading via BotRunner (ATR Intraday only).
# collector is independent — its only job is to capture historical option premium
# data for backtest realism.
volumes:
  app_data:
  app_logs:
  app_journals:
