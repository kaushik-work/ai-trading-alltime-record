services:

  bot:
    build: .
    command: python main.py
    env_file: .env
    volumes:
      - app_data:/app/db
      - app_logs:/app/logs
      - app_journals:/app/journals
    restart: unless-stopped

  api:
    build: .
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --workers 1
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/db
      - app_logs:/app/logs
      - app_journals:/app/journals
    depends_on:
      - bot
    restart: unless-stopped

# bot and api share app_data so SQLite + IPC flags (db/flags/) work across both containers
volumes:
  app_data:
  app_logs:
  app_journals:
