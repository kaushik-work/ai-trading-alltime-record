services:

  api:
    build: .
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --workers 1
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env
      - ./backtest_cache:/app/backtest_cache
      - app_data:/app/db
      - app_logs:/app/logs
      - app_journals:/app/journals
    restart: unless-stopped

# api handles everything — ATR Intraday + C-ICT both run inside api via BotRunner
volumes:
  app_data:
  app_logs:
  app_journals:
